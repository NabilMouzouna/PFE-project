name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

env:
  CI: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js 22 + pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -w check-types

      - name: Lint
        run: pnpm -w lint

      - name: Unit tests (@appbase/db)
        run: pnpm --filter @appbase/db test

      - name: Unit tests (@appbase/sdk)
        run: pnpm --filter @appbase/sdk test

      - name: Unit tests (@appbase/storage)
        run: pnpm --filter @appbase/storage test

      - name: Unit & integration tests (api)
        run: pnpm --filter api test

